<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. John Vourganas — Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Barlow:wght@300;400&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020D17;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 60px 24px;
    overflow-x: hidden;
  }

  .scene {
    width: 900px;
    height: 500px;
    perspective: 1800px;
    cursor: pointer;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.76, 0, 0.18, 1);
    border-radius: 12px;
  }

  .scene:hover .card,
  .scene.flipped .card { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* ═══════════ FRONT ═══════════ */
  .front {
    background: #061524;
    background-image:
      radial-gradient(ellipse 65% 70% at 5% 55%,  rgba(0,120,180,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 95% 10%,  rgba(0,100,160,0.04) 0%, transparent 55%);
    box-shadow:
      0 0 0 1px rgba(0,150,200,0.13),
      0 40px 100px rgba(0,0,0,0.85);
  }

  .front-line {
    position: absolute;
    top: 0; left: 52px; right: 52px;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(0,174,239,0.55) 25%,
      rgba(0,174,239,0.55) 75%,
      transparent);
  }

  .v-mark {
    position: absolute;
    top: 40px;
    left: 52px;
  }
  .v-mark img { width: 38px; height: 38px; }

  /* ── Αριστερό μπλοκ ── */
  .left-block {
    position: absolute;
    left: 56px;
    top: 50%;
    transform: translateY(-50%);
    width: auto;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 42px;
    letter-spacing: 0.01em;
    color: #EEF4FF;
    line-height: 1;
    margin-bottom: 24px;
    white-space: nowrap;
  }

  .roles {
    display: flex;
    flex-direction: column;
    gap: 0;
    border-left: 1px solid rgba(0,174,239,0.22);
    padding-left: 16px;
    width: fit-content;
  }

  .dr {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.12em;
    color: rgba(0,174,239,0.6);
    margin-bottom: 4px;
  }

  .role {
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    padding: 7px 0;
    white-space: nowrap;
  }

  .role-1 {
    font-weight: 500;
    font-size: 12.5px;
    color: rgba(0,174,239,0.9);
    border-bottom: 1px solid rgba(0,174,239,0.1);
  }

  .role-2 {
    font-weight: 400;
    font-size: 11.5px;
    color: rgba(0,174,239,0.6);
    border-bottom: 1px solid rgba(0,174,239,0.1);
  }

  .role-3 {
    font-weight: 300;
    font-size: 11px;
    color: rgba(0,174,239,0.38);
  }

  /* ── Διαχωριστής ── */
  .vdivider {
    position: absolute;
    left: 518px;
    top: 60px;
    bottom: 60px;
    width: 1px;
    background: linear-gradient(180deg,
      transparent,
      rgba(0,150,200,0.2) 20%,
      rgba(0,150,200,0.2) 80%,
      transparent);
  }

  /* ── Δεξί μπλοκ — Επικοινωνία ── */
  .right-block {
    position: absolute;
    left: 546px;
    right: 52px;
    top: 50%;
    transform: translateY(-50%);
  }

  .contact-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: rgba(0,174,239,0.32);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .contact-item {
    margin-bottom: 12px;
  }

  .contact-type {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(0,174,239,0.38);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .contact-value {
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.02em;
    color: rgba(238,244,255,0.72);
  }

  .phones {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
  }

  .phones span {
    display: block;
    color: rgba(238,244,255,0.65);
  }

  /* Netrity — πολύ διακριτικά, κάτω δεξιά */
  .netrity {
    position: absolute;
    bottom: 34px;
    right: 52px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(0,174,239,0.2);
    text-transform: uppercase;
  }

  /* ═══════════ BACK ═══════════ */
  .back {
    transform: rotateY(180deg);
    background: #071828;
    background-image:
      radial-gradient(ellipse 60% 60% at 50% 50%,
        rgba(0,120,180,0.08) 0%, transparent 65%);
    box-shadow:
      0 0 0 1px rgba(0,150,200,0.1),
      0 40px 100px rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .back-line {
    position: absolute;
    bottom: 0; left: 52px; right: 52px;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(0,174,239,0.45) 30%,
      rgba(0,174,239,0.45) 70%,
      transparent);
  }

  .corner { position: absolute; width: 18px; height: 18px; }
  .c-tl { top: 20px; left: 20px; border-top: 1px solid rgba(0,174,239,0.18); border-left: 1px solid rgba(0,174,239,0.18); }
  .c-tr { top: 20px; right: 20px; border-top: 1px solid rgba(0,174,239,0.18); border-right: 1px solid rgba(0,174,239,0.18); }
  .c-bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(0,174,239,0.18); border-left: 1px solid rgba(0,174,239,0.18); }
  .c-br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(0,174,239,0.18); border-right: 1px solid rgba(0,174,239,0.18); }

  .back-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .back-v img { width: 88px; height: 88px; }

  .back-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.48em;
    color: rgba(238,244,255,0.5);
    text-transform: uppercase;
    margin-right: -0.48em;
  }

  .back-rule {
    width: 36px;
    height: 1px;
    background: rgba(0,174,239,0.25);
  }

  .back-phones { display: none; }

  .back-contact {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    width: 100%;
  }

  .back-divider {
    width: 28px;
    height: 1px;
    background: rgba(0,174,239,0.18);
    margin: 2px 0;
  }

  .back-phone {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 160px;
  }

  .bflag {
    font-size: 13px;
    line-height: 1;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  .bicon {
    font-size: 11px;
    color: rgba(0,174,239,0.45);
    width: 20px;
    text-align: center;
    line-height: 1;
  }

  .bnum {
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    font-size: 12.5px;
    letter-spacing: 0.04em;
    color: rgba(238,244,255,0.62);
  }

  .blink {
    text-decoration: none;
    color: rgba(238,244,255,0.62);
    transition: color 0.2s;
  }
  .blink:hover { color: rgba(0,174,239,0.9); }

  /* ── Κουμπιά ── */
  .controls {
    display: flex;
    gap: 14px;
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(0,150,200,0.22);
    color: rgba(0,174,239,0.55);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10.5px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 8px 22px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .btn:hover { border-color: rgba(0,174,239,0.5); color: rgba(0,174,239,0.9); }

  .hint {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(100,140,170,0.25);
    text-transform: uppercase;
  }

  @media print {
    body { background: white; padding: 0; }
    .controls, .hint { display: none; }
    .scene { width: 3.5in; height: 2in; perspective: none; margin: 0.2in auto; }
    .card { transform: none !important; }
    .face { position: relative; backface-visibility: visible; -webkit-backface-visibility: visible; }
    .front { width: 3.5in; height: 2in; page-break-after: always; }
    .back { transform: none; width: 3.5in; height: 2in; }
  }
</style>

<script>
  function scaleCard() {
    const scene = document.querySelector('.scene');
    const cardW = 900;
    const cardH = 500;
    const vw = Math.min(document.documentElement.clientWidth - 24, cardW);
    if (vw < cardW) {
      const scale = vw / cardW;
      scene.style.transform = `scale(${scale})`;
      scene.style.transformOrigin = 'top center';
      scene.style.marginBottom = `-${cardH * (1 - scale)}px`;
    } else {
      scene.style.transform = '';
      scene.style.marginBottom = '';
    }
  }
  window.addEventListener('load', scaleCard);
  window.addEventListener('resize', scaleCard);
</script>
</head>

    image:       { type: 'jpeg', quality: 0.98 },

    jsPDF:       { unit: 'px', format: [900, 1040], orientation: 'portrait' }
  };

  try {
    await html2pdf().set(opt).from(container).save();
  } finally {
    document.body.removeChild(container);
    btn.textContent = '⬇ Download PDF';
    btn.disabled = false;
  }
}
</script>

</body>
</html>
